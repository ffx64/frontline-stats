events {
    worker_connections 1024;
}

http {
    client_max_body_size 5m;

    upstream gamestats-api {
        least_conn;

        server gamestats_backend_1:8080;
        server gamestats_backend_2:8080;
        server gamestats_backend_3:8080;

        keepalive 32;
    }

    server {
        listen 80;

        error_log  /var/log/nginx/error-api.log;
        access_log /var/log/nginx/access-api.log;

        include /etc/nginx/mime.types;

        location / {
            proxy_pass http://gamestats-api/;

            proxy_read_timeout 120s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
        }
    }
}
